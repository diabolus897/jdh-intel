<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首席情报官 · 每日动态情报</title>
<style>
  :root{
    --bg:#EDF0EE;--paper:#FFF;--ink:#14201B;--ink2:#54635C;--ink3:#8A958E;
    --brand:#0E6E54;--brand-deep:#0A5340;--brand-soft:#E6F2EC;
    --line:rgba(20,33,28,.09);--line2:rgba(20,33,28,.15);
    --hi:#C0392B;--hi-bg:#FBEAE8;--mid:#B26A09;--mid-bg:#FAF0DC;--lo:#6B756F;--lo-bg:#EEEEEB;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit}

  /* ---------- header ---------- */
  header{background:linear-gradient(170deg,#0F745A,#093F31);color:#fff;position:sticky;top:0;z-index:20;box-shadow:0 1px 0 rgba(0,0,0,.06)}
  .hd{max-width:1120px;margin:0 auto;padding:16px 24px 0}
  .brand{display:flex;align-items:baseline;gap:11px}
  .brand h1{font-size:18px;font-weight:680;letter-spacing:.2px}
  .depttabs{display:flex;gap:4px;margin-top:14px;overflow-x:auto;scrollbar-width:none}
  .depttabs::-webkit-scrollbar{display:none}
  .dtab{padding:10px 17px;color:rgba(255,255,255,.62);font-size:14px;white-space:nowrap;cursor:pointer;border-bottom:2.5px solid transparent;transition:.15s;border-radius:7px 7px 0 0}
  .dtab:hover{color:#fff;background:rgba(255,255,255,.07)}
  .dtab.on{color:#fff;border-bottom-color:#74E6BC;font-weight:650}
  .brand{justify-content:space-between}
  .datepick{display:flex;align-items:center;gap:7px;flex-shrink:0}
  .datepick .dp-ico{font-size:13px;opacity:.85}
  #datesel{appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:5px 26px 5px 11px;font-size:13px;font-family:inherit;cursor:pointer;outline:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='white' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 9px center}
  #datesel:hover{background-color:rgba(255,255,255,.2)}
  #datesel option{color:#14201B}
  .dp-latest{font-size:10.5px;font-weight:700;color:#74E6BC;background:rgba(116,230,188,.14);padding:2px 7px;border-radius:5px;white-space:nowrap}
  .dp-hist{font-size:10.5px;font-weight:700;color:#F0C56A;background:rgba(240,197,106,.16);padding:2px 7px;border-radius:5px;white-space:nowrap}

  /* ---------- page ---------- */
  .page{max-width:1120px;margin:0 auto;padding:24px 24px 72px}
  .statusbar{display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:12.5px;color:var(--ink3)}
  .statusbar b{color:var(--ink2);font-weight:600}
  .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:#28C28A;margin-right:6px;box-shadow:0 0 0 3px rgba(40,194,138,.18)}
  h2.dept{font-size:25px;font-weight:720;letter-spacing:-.4px;margin:7px 0 0}
  .lead{font-size:14.5px;color:var(--ink2);background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:0 11px 11px 0;padding:13px 17px;margin:14px 0 8px}

  /* ---------- eyebrow ---------- */
  .eyebrow{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:1.6px;color:var(--ink3);margin:26px 0 13px}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}

  /* ---------- 今日必读 ---------- */
  .musts{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:13px}
  .must{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:15px 16px 14px;position:relative;transition:.16s}
  .must:hover{border-color:var(--line2);box-shadow:0 4px 18px rgba(20,33,28,.06);transform:translateY(-1px)}
  .must .no{font-size:12px;font-weight:800;color:var(--brand);letter-spacing:.5px}
  .must .mt{font-size:15.5px;font-weight:680;line-height:1.38;margin:5px 0 6px}
  .must .mt a{text-decoration:none}.must .mt a:hover{color:var(--brand)}
  .must .mn{font-size:12.5px;color:var(--ink2);line-height:1.55}
  .must .tagrow{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}

  /* ---------- tags ---------- */
  .dimtag{font-size:11px;font-weight:650;padding:2px 8px;border-radius:6px}
  .rel{font-size:10.5px;font-weight:750;padding:2px 7px;border-radius:6px;letter-spacing:.3px}
  .rel.hi{background:var(--hi-bg);color:var(--hi)}.rel.mid{background:var(--mid-bg);color:var(--mid)}.rel.lo{background:var(--lo-bg);color:var(--lo)}
  /* 新鲜度标记 */
  .fresh{font-size:10px;font-weight:800;letter-spacing:.3px;padding:2px 7px;border-radius:6px;background:#FFF3D6;color:#A8730A;border:1px solid #F0C56A;white-space:nowrap}
  /* 政策生效倒计时 */
  .eff{font-size:10px;font-weight:800;letter-spacing:.3px;padding:2px 7px;border-radius:6px;white-space:nowrap}
  .eff-soon{background:#FBEAE8;color:#C0392B;border:1px solid #E8A89F}
  .eff-on{background:#E1F5EE;color:#0A5340;border:1px solid #8FCFB8}
  .item.is-new{border-color:#F0C56A;box-shadow:0 0 0 1px rgba(240,197,106,.35)}
  .feed-it.is-new{position:relative;padding-left:9px}
  .feed-it.is-new::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:3px;border-radius:2px;background:#F0C56A}
  .sec-new{font-size:11px;font-weight:700;color:#A8730A;background:#FFF3D6;border:1px solid #F0C56A;padding:1px 7px;border-radius:6px;margin-left:2px}
  .sec-wk{font-size:11px;font-weight:700;color:#0C447C;background:#E6F1FB;border:1px solid #A9CCEC;padding:1px 8px;border-radius:6px;margin-left:6px;white-space:nowrap}

  /* ---------- 维度分区 ---------- */
  .sec{margin-top:24px}
  .sec-h{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;padding-bottom:4px}
  .sec-bar{width:4px;height:17px;border-radius:2px}
  .sec-t{font-size:16px;font-weight:680}
  .sec-c{font-size:12px;color:var(--ink3);font-weight:500}
  .sec-chev{margin-left:auto;color:var(--ink3);font-size:13px;transition:.2s}
  .sec.collapsed .sec-chev{transform:rotate(-90deg)}.sec.collapsed .items{display:none}
  .items{display:grid;grid-template-columns:repeat(auto-fit,minmax(335px,1fr));gap:12px;margin-top:11px}
  .item{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:14px 15px;transition:.16s}
  .item:hover{border-color:var(--line2);box-shadow:0 3px 14px rgba(20,33,28,.05)}
  .it{font-size:14.5px;font-weight:660;line-height:1.4}
  .id{font-size:12.8px;color:var(--ink2);margin-top:5px;line-height:1.58}
  .tk{font-size:12.3px;color:var(--brand-deep);background:var(--brand-soft);border-radius:7px;padding:6px 11px;display:block;margin-top:9px;line-height:1.5}
  .im{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink3);display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .im a{color:var(--brand);font-weight:600;text-decoration:none;margin-left:auto}
  .im a:hover{text-decoration:underline}
  .empty-dim{grid-column:1/-1;padding:14px 16px;border:1px dashed var(--line2);border-radius:10px;font-size:13px;color:var(--ink3)}

  /* ---------- 即时零售：竞对卡片化 ---------- */
  .layer-lbl{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink2);margin:14px 0 10px}
  .layer-lbl .lb-dot{width:6px;height:6px;border-radius:50%;background:var(--brand)}
  .layer-lbl .lb-c{font-size:11.5px;color:var(--ink3);font-weight:500}
  .ccards{display:grid;gap:12px;align-items:start}
  .ccards.o2o{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
  .ccards.chain{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .ccard{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:15px 16px;transition:.16s}
  .ccard:hover{border-color:var(--line2);box-shadow:0 4px 18px rgba(20,33,28,.06)}
  .cc-hd{display:flex;align-items:baseline;gap:8px;padding-bottom:11px;border-bottom:1px solid var(--line)}
  .cc-name{font-size:16px;font-weight:720}
  .cc-code{font-size:11.5px;color:var(--ink3);font-weight:600}
  .cc-tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--brand-soft);color:var(--brand-deep);margin-left:auto}
  /* 财报小卡 */
  .fin{margin:11px 0 4px;background:#FAFBFA;border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .fin-h{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--ink3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .fin-h .fin-src{margin-left:auto;font-weight:600}
  .fin-h .fin-src a{color:var(--brand);text-decoration:none}
  .fin-grid{display:grid;grid-template-columns:auto 1fr 1fr;gap:5px 12px;font-size:12px;align-items:baseline}
  .fin-grid .fh{color:var(--ink3);font-weight:600;font-size:10.5px;letter-spacing:.3px}
  .fin-grid .fl{color:var(--ink3);font-size:11.5px}
  .fin-grid .fv{font-weight:680;color:var(--ink);font-variant-numeric:tabular-nums}
  .fin-grid .fv .yoy{font-size:10.5px;font-weight:600;color:var(--ink3);margin-left:4px;white-space:nowrap}
  .fin-grid .fv .up{color:#1E8E5A}.fin-grid .fv .down{color:var(--hi)}
  .fin-na{color:var(--ink3);font-weight:500}
  /* 经营速览卡升级 */
  .fin-cov{font-size:11px;color:var(--ink2);line-height:1.5;margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed var(--line)}
  .fin-cov b{color:var(--ink);font-weight:680}
  .fin-grid .fr-hl{background:var(--brand-soft);margin:0 -4px;padding:2px 4px;border-radius:4px}
  .fin-grid .fv .add{font-size:10px;font-weight:600;margin-left:3px}
  .fin-grid .fv .add.up{color:#1E8E5A}.fin-grid .fv .add.down{color:var(--hi)}
  .fin-strat{margin-top:9px;font-size:11.5px;line-height:1.6;color:var(--ink2)}
  .fin-strat .fs-h{font-weight:700;color:var(--ink2);font-size:11px}
  .fin-strat ul{margin:3px 0 0;padding-left:16px}
  .fin-strat li{margin:1px 0}
  .fin-memo{margin-top:8px;font-size:11.5px}
  .fin-memo a{color:var(--brand);text-decoration:none;font-weight:600}
  .fin-memo a:hover{text-decoration:underline}
  .fin-memo .mm-date{color:var(--ink3);font-weight:500;margin-left:5px}
  /* ---------- 连锁药房经营档案：折叠面板 + 三家对比表 ---------- */
  .cpanel{background:var(--paper);border:1px solid var(--line);border-radius:13px;margin:18px 0 4px;overflow:hidden}
  .cp-h{display:flex;align-items:center;gap:8px;padding:13px 16px;cursor:pointer;user-select:none;background:#FAFBFA;border-bottom:1px solid var(--line)}
  .cp-ico{font-size:15px}
  .cp-t{font-size:14.5px;font-weight:700;color:var(--ink)}
  .cp-sub{font-size:11px;color:var(--ink3);font-weight:500}
  .cp-upd{font-size:10.5px;font-weight:700;color:var(--brand-deep);background:var(--brand-soft);padding:2px 7px;border-radius:5px;margin-left:auto}
  .cp-chev{color:var(--ink3);font-size:13px;transition:.2s;margin-left:8px}
  .cpanel.collapsed .cp-chev{transform:rotate(-90deg)}
  .cpanel.collapsed .cp-h{border-bottom:none}
  .cpanel.collapsed .cp-body{display:none}
  .cp-body{padding:14px 16px 16px}
  .ctable{display:grid;gap:6px 14px;font-size:12.5px;align-items:baseline}
  .ct-cnr{}
  .ct-name{font-size:13.5px;font-weight:720;color:var(--ink);padding-bottom:6px;border-bottom:2px solid var(--brand-soft);display:flex;flex-direction:column;gap:1px}
  .ct-code{font-size:10px;font-weight:600;color:var(--ink3)}
  .ct-l{color:var(--ink3);font-weight:600;font-size:11.5px;white-space:nowrap}
  .ct-v{font-weight:680;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
  .ct-v .yoy{font-size:10.5px;font-weight:600;color:var(--ink3);margin-left:4px;white-space:nowrap}
  .ct-v .add{font-size:10px;font-weight:600;margin-left:3px;white-space:nowrap}
  .ct-v .up,.ct-v .yoy.up,.ct-v .add.up{color:#1E8E5A}
  .ct-v .down,.ct-v .yoy.down,.ct-v .add.down{color:var(--hi)}
  .ct-hl{background:var(--brand-soft);margin:0 -5px;padding:2px 5px;border-radius:4px}
  .ct-na{color:var(--ink3);font-weight:500}
  .cp-cols{display:grid;gap:14px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--line)}
  .cp-col{font-size:11.5px;line-height:1.5}
  .cp-cn{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
  .cp-adv{color:var(--ink2);margin-bottom:7px}
  .cp-strat .cp-sh{font-weight:700;color:var(--ink2);font-size:11px;display:flex;align-items:center;gap:6px}
  .cp-src{font-size:9.5px;font-weight:700;color:var(--ink3);background:var(--lo-bg);padding:1px 6px;border-radius:5px}
  .cp-strat ul{margin:4px 0 0;padding-left:15px;color:var(--ink2)}
  .cp-strat li{margin:2px 0}
  .cp-memo{margin-top:8px}
  .cp-memo a{color:var(--brand);text-decoration:none;font-weight:600}
  .cp-memo a:hover{text-decoration:underline}
  .cp-md{color:var(--ink3);font-weight:500;margin-left:5px}
  @media(max-width:640px){.cp-cols{grid-template-columns:1fr!important}}
  /* 卡内动态流 */
  .cc-feed{margin-top:11px;display:flex;flex-direction:column;gap:9px;max-height:208px;overflow-y:auto}
  .cc-feed::-webkit-scrollbar{width:5px}
  .cc-feed::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
  .cc-feed{scrollbar-width:thin}
  .feed-it{font-size:12.8px;line-height:1.5}
  .feed-it .ft{font-weight:640;color:var(--ink)}
  .feed-it .ft a{text-decoration:none}.feed-it .ft a:hover{color:var(--brand)}
  .feed-it .fmeta{font-size:11px;color:var(--ink3);margin-top:3px;display:flex;gap:7px;align-items:center}
  .feed-it .fmeta a{color:var(--brand);text-decoration:none;font-weight:600}
  .feed-empty{font-size:12px;color:var(--ink3);font-style:italic}

  .state{padding:80px 0;text-align:center;color:var(--ink3);font-size:14px}
  .state b{display:block;color:var(--ink2);font-size:15px;margin-bottom:6px}
  .foot{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink3);line-height:1.8}
  .foot b{color:var(--ink2);font-weight:600}

  @media(max-width:640px){
    .hd,.page{padding-left:16px;padding-right:16px}
    h2.dept{font-size:22px}
    .items{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<header><div class="hd">
  <div class="brand">
    <h1>首席情报官 · 每日动态情报</h1>
    <div class="datepick" id="datepick" style="display:none">
      <span class="dp-ico">📅</span>
      <select id="datesel"></select>
      <span id="dpflag"></span>
    </div>
  </div>
  <div class="depttabs" id="depttabs"></div>
</div></header>
<div class="page" id="page"><div class="state">正在加载…</div></div>

<script>
const DIMSTYLE={
  "竞对动态":["#993556","#FBEAF0"],"政策动态":["#0C447C","#E6F1FB"],
  "工业动态":["#3C3489","#EEEDFE"],"新品动态":["#0F6E56","#E1F5EE"],
  "新技术·新模式":["#854F0B","#FAEEDA"],"行业·资本":["#3B6D11","#EAF3DE"]
};
const DIM_ORDER=["竞对动态","政策动态","工业动态","新品动态","新技术·新模式","行业·资本"];
function orderDims(arr){return [...arr].sort((a,b)=>(DIM_ORDER.indexOf(a)+99)%100-(DIM_ORDER.indexOf(b)+99)%100);}

const FALLBACK_DATA={"generated":"—","depts":[{"id":"nutri","name":"营养保健","dims":["竞对动态","政策动态","工业动态","新品动态"],"brief":null}]};

let DATA=null, cur=null, PROFILES=null, PRODUCTS=null;
const $=id=>document.getElementById(id);
function esc(t){return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function relLabel(r){return r==="hi"?"高相关":r==="mid"?"中相关":"低相关"}
function dimTag(d){const s=DIMSTYLE[d]||["#5F5E5A","#F1EFE8"];return `<span class="dimtag" style="background:${s[1]};color:${s[0]}">${d}</span>`}
function dateVal(d){const m=(d||"").match(/(\d{4})-(\d{1,2})(?:-(\d{1,2}))?/);if(!m)return 0;return new Date(+m[1],+m[2]-1,+(m[3]||1)).getTime();}
// 新鲜度：firstSeen==本批 generated 即"本轮首次入池"→今日新增
function isNew(it){return it && it.firstSeen && DATA && it.firstSeen===DATA.generated;}
function freshBadge(it){return isNew(it)?'<span class="fresh">🆕 今日新增</span>':'';}
function countNew(items){return (items||[]).filter(isNew).length;}
// 政策生效倒计时徽标：item.effective='YYYY-MM-DD' 时显示「⏳ 距生效 N 天 / ✅ 已生效」
function effBadge(it){
  if(!it||!it.effective) return '';
  const t=dateVal(it.effective); if(!t) return '';
  const today=DATA&&DATA.generated?dateVal(DATA.generated):0;
  if(!today) return '';
  const days=Math.round((t-today)/864e5);
  if(days>0) return `<span class="eff eff-soon">⏳ 距生效 ${days} 天</span>`;
  return `<span class="eff eff-on">✅ 已生效</span>`;
}

function renderTabs(){
  $('depttabs').innerHTML=DATA.depts.map(d=>
    `<div class="dtab ${d.id===cur?'on':''}" onclick="setDept('${d.id}')">${d.name}</div>`).join('');
}
function setDept(id){cur=id;renderTabs();render();window.scrollTo(0,0);}

function renderBrief(dep){
  const b=dep.brief;
  let h=`<div class="statusbar"><span><span class="pulse"></span>更新 <b>${esc(DATA.generated)}</b></span><span>🆕 今日新增置顶</span><span>滚动情报池</span></div>
    <h2 class="dept">${dep.name} · 今日动态</h2>
    <div class="eyebrow">今日必读</div><div class="musts">`;
  (b.musts||[]).forEach((m,i)=>{
    h+=`<div class="must"><div class="no">必读 ${String(i+1).padStart(2,'0')}</div>
      <div class="mt"><a href="${esc(m.url)}" target="_blank" rel="noopener">${esc(m.title)}</a></div>
      <div class="mn">${esc(m.note)}</div>
      <div class="tagrow">${dimTag(m.dim)}<span class="rel ${m.rel}">${relLabel(m.rel)}</span></div></div>`;
  });
  h+=`</div>`;
  // 即时零售：连锁药房经营档案（季度静态面板，今日必读后、维度分区前）
  if(dep.id==='instant') h+=renderChainPanel();
  // 维度分区：竞对在前，items 按日期倒序
  const secs=[...(b.sections||[])].sort((a,b2)=>DIM_ORDER.indexOf(a.dim)-DIM_ORDER.indexOf(b2.dim));
  secs.forEach(s=>{
    const st=DIMSTYLE[s.dim]||["#5F5E5A","#F1EFE8"];
    // 卡片化布局（即时零售/医药竞对等）：section 含 layers 即走卡片渲染
    if(b.layout && s.layers){
      const n=s.layers.reduce((a,l)=>a+(l.cards||[]).length,0);
      h+=`<div class="sec"><div class="sec-h" onclick="this.parentNode.classList.toggle('collapsed')">
        <span class="sec-bar" style="background:${st[0]}"></span><span class="sec-t">${s.dim}</span>
        <span class="sec-c">${n} 个对手</span><span class="sec-chev">▾</span></div><div class="items" style="display:block">`;
      h+=renderLayers(s.layers);
      h+=`</div></div>`;
      return;
    }
    // 新品动态：改读周报 newproducts.json（中流数据，每周挂载），不读 data.json 的 items
    if(s.dim==='新品动态'){
      const prods=(PRODUCTS&&PRODUCTS.depts&&PRODUCTS.depts[dep.id])||[];
      const pitems=[...prods].sort((a,b2)=>dateVal(b2.date)-dateVal(a.date));
      const wkBadge=PRODUCTS&&PRODUCTS.updated?`<span class="sec-wk">📅 新品周报 · 更新于 ${esc(PRODUCTS.updated)}</span>`:'';
      h+=`<div class="sec"><div class="sec-h" onclick="this.parentNode.classList.toggle('collapsed')">
        <span class="sec-bar" style="background:${st[0]}"></span><span class="sec-t">${s.dim}</span>
        <span class="sec-c">${pitems.length} 条</span>${wkBadge}<span class="sec-chev">▾</span></div><div class="items">`;
      if(!PRODUCTS){h+=`<div class="empty-dim">新品见每周周报（加载中…）</div>`;}
      else if(!pitems.length){h+=`<div class="empty-dim">本周周报暂无该部门新品</div>`;}
      else pitems.forEach(it=>{
        const tk=it.takeaway?`<div class="tk">→ 对JDH：${esc(it.takeaway)}</div>`:'';
        h+=`<div class="item"><div class="it">${esc(it.title)}</div><div class="id">${esc(it.summary)}</div>${tk}
          <div class="im"><span class="rel ${it.rel}">${relLabel(it.rel)}</span><span>${esc(it.source)} · ${esc(it.date)}</span><a href="${esc(it.url)}" target="_blank" rel="noopener">原文 ↗</a></div></div>`;
      });
      h+=`</div></div>`;
      return;
    }
    const items=[...(s.items||[])].sort((a,b2)=>dateVal(b2.date)-dateVal(a.date));
    const nNew=countNew(items);
    h+=`<div class="sec"><div class="sec-h" onclick="this.parentNode.classList.toggle('collapsed')">
      <span class="sec-bar" style="background:${st[0]}"></span><span class="sec-t">${s.dim}</span>
      <span class="sec-c">${items.length} 条</span>${nNew?`<span class="sec-new">🆕 ${nNew}</span>`:''}<span class="sec-chev">▾</span></div><div class="items">`;
    if(!items.length){h+=`<div class="empty-dim">今日无新动态</div>`;}
    else items.forEach(it=>{
      const tk=it.takeaway?`<div class="tk">→ 对JDH：${esc(it.takeaway)}</div>`:'';
      h+=`<div class="item${isNew(it)?' is-new':''}"><div class="it">${esc(it.title)}</div><div class="id">${esc(it.summary)}</div>${tk}
        <div class="im"><span class="rel ${it.rel}">${relLabel(it.rel)}</span>${freshBadge(it)}${effBadge(it)}<span>${esc(it.source)} · ${esc(it.date)}</span><a href="${esc(it.url)}" target="_blank" rel="noopener">原文 ↗</a></div></div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

// 即时零售竞对：渲染分层卡片（O2O / 连锁药店）
function renderLayers(layers){
  let h='';
  layers.forEach(layer=>{
    const cards=layer.cards||[];
    if(layer.title) h+=`<div class="layer-lbl"><span class="lb-dot"></span>${esc(layer.title)}<span class="lb-c">${cards.length} 家</span></div>`;
    h+=`<div class="ccards ${layer.type==='chain'?'chain':'o2o'}">`;
    cards.forEach(c=>{
      h+=`<div class="ccard"><div class="cc-hd"><span class="cc-name">${esc(c.name)}</span>`;
      if(c.code) h+=`<span class="cc-code">${esc(c.code)}</span>`;
      if(c.tag) h+=`<span class="cc-tag">${esc(c.tag)}</span>`;
      h+=`</div>`;
      h+=`<div class="cc-feed">`;
      const items=[...(c.items||[])].sort((a,b)=>dateVal(b.date)-dateVal(a.date));
      if(!items.length){h+=`<div class="feed-empty">窗口内暂无新动态</div>`;}
      else items.forEach(it=>{
        h+=`<div class="feed-it${isNew(it)?' is-new':''}"><div class="ft">`+
           (it.url?`<a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>`:esc(it.title))+freshBadge(it)+`</div>`;
        if(it.summary) h+=`<div class="id" style="margin-top:3px">${esc(it.summary)}</div>`;
        h+=`<div class="fmeta"><span>${esc(it.source||'')}${it.date?' · '+esc(it.date):''}</span>`+
           (it.url?`<a href="${esc(it.url)}" target="_blank" rel="noopener" style="margin-left:auto">原文 ↗</a>`:'')+`</div></div>`;
      });
      h+=`</div></div>`;
    });
    h+=`</div>`;
  });
  return h;
}

// 连锁药房经营档案（季度静态，读 profiles.json）：可折叠面板 + 三家对比表
function yoyHtml(v,cls){ // v 形如 "+1.54%" / "-26.44%"；cls: 'yoy'(inline) 或 'add'(门店增量)
  if(!v) return '';
  const s=String(v).trim();
  const dir=/^[-－]/.test(s)?'down':'up';
  const arrow=cls==='yoy'?(dir==='up'?'▲':'▼')+' ':'';
  const txt=cls==='add'?'('+s+')':s;
  return `<span class="${cls} ${dir}">${arrow}${esc(txt)}</span>`;
}
function renderChainPanel(){
  const chains=(PROFILES&&PROFILES.instant&&PROFILES.instant.chains)||[];
  if(!chains.length) return '';
  const upd=PROFILES.updated?`<span class="cp-upd">口径 ${esc(PROFILES.updated)}</span>`:'';
  // 取每家“头条期”=periods[0]（2025年报，口径最全、可横向比）
  const head=chains.map(c=>(c.periods&&c.periods[0])||{});
  const pLabel=head.find(p=>p.label)?head.find(p=>p.label).label:'';
  let h=`<div class="cpanel collapsed"><div class="cp-h" onclick="this.parentNode.classList.toggle('collapsed')">
    <span class="cp-ico">📁</span><span class="cp-t">连锁药房经营档案</span>
    <span class="cp-sub">季度更新 · 不随日更变${pLabel?' · '+esc(pLabel):''}</span>${upd}<span class="cp-chev">▾</span></div>
    <div class="cp-body">`;
  // 对比表
  h+=`<div class="ctable" style="grid-template-columns:auto repeat(${chains.length},1fr)">`;
  h+=`<span class="ct-cnr"></span>`+chains.map(c=>
    `<span class="ct-name">${esc(c.name)}${c.code?`<span class="ct-code">${esc(c.code)}</span>`:''}</span>`).join('');
  const row=(lbl,key,opt={})=>{
    if(!head.some(p=>p[key])) return '';
    let r=`<span class="ct-l${opt.hl?' ct-hl':''}">${lbl}</span>`;
    head.forEach(p=>{
      const v=p[key];
      if(!v||v==='未查到'){r+=`<span class="ct-v ct-na${opt.hl?' ct-hl':''}">—</span>`;return;}
      let cell=esc(v);
      if(opt.yoyKey&&p[opt.yoyKey]) cell+=' '+yoyHtml(p[opt.yoyKey],'yoy');
      if(opt.addKey&&p[opt.addKey]) cell+=' '+yoyHtml(p[opt.addKey],'add');
      r+=`<span class="ct-v${opt.hl?' ct-hl':''}">${cell}</span>`;
    });
    return r;
  };
  h+=row('营收','revenue',{yoyKey:'revenueYoy'});
  h+=row('归母净利','profit',{yoyKey:'profitYoy',hl:true});
  h+=row('毛利率','grossMargin');
  h+=row('净利率','margin');
  h+=row('经营现金流','cashflow',{yoyKey:'cashflowYoy'});
  h+=row('门店数','stores',{addKey:'storesAdd'});
  h+=row('直营','storesDirect',{addKey:'storesDirectAdd'});
  h+=row('加盟','storesFranchise',{addKey:'storesFranchiseAdd'});
  // 覆盖省份（来自 coverage.count）
  if(chains.some(c=>c.coverage&&c.coverage.count)){
    let r=`<span class="ct-l">覆盖省份</span>`;
    chains.forEach(c=>{const n=c.coverage&&c.coverage.count;r+=`<span class="ct-v">${n?esc(String(n))+' 省':'—'}</span>`;});
    h+=r;
  }
  h+=`</div>`;
  // 表下：每家 优势省 + 战略要点（标来源）+ 纪要
  h+=`<div class="cp-cols" style="grid-template-columns:repeat(${chains.length},1fr)">`;
  chains.forEach(c=>{
    h+=`<div class="cp-col"><div class="cp-cn">${esc(c.name)}</div>`;
    if(c.coverage&&c.coverage.advantage) h+=`<div class="cp-adv">📍 ${esc(c.coverage.advantage)}</div>`;
    const st=c.strategy;
    if(st&&Array.isArray(st.points)&&st.points.length){
      const srcTag=st.source?`<span class="cp-src">${esc(st.source)}</span>`:'';
      h+=`<div class="cp-strat"><div class="cp-sh">🎯 战略要点${srcTag}</div><ul>`+
         st.points.map(p=>`<li>${esc(p)}</li>`).join('')+`</ul></div>`;
    }
    const m=c.memo;
    if(m&&m.title){
      const dt=m.date?`<span class="cp-md">${esc(m.date)}</span>`:'';
      h+=`<div class="cp-memo">📋 `+
         (m.url?`<a href="${esc(m.url)}" target="_blank" rel="noopener">${esc(m.title)} ↗</a>`:esc(m.title))+dt+`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div></div></div>`;
  return h;
}

function renderSkeleton(dep){
  let h=`<div class="statusbar"><span><span class="pulse"></span>更新 <b>${esc(DATA.generated)}</b></span></div>
    <h2 class="dept">${dep.name} · 今日动态</h2>
    <div class="lead">本部门今日暂无加工结果，稍后自动更新。</div>`;
  orderDims(dep.dims).forEach(dim=>{
    const st=DIMSTYLE[dim]||["#5F5E5A","#F1EFE8"];
    h+=`<div class="sec"><div class="sec-h"><span class="sec-bar" style="background:${st[0]}"></span><span class="sec-t">${dim}</span><span class="sec-c">—</span></div>
      <div class="items"><div class="empty-dim">今日暂无最新动态</div></div></div>`;
  });
  return h;
}

function render(){
  const dep=DATA.depts.find(d=>d.id===cur);
  $('page').innerHTML=(dep.brief?renderBrief(dep):renderSkeleton(dep))+
    `<div class="foot"><b>战略与综合支持部</b> 出品　/　相关问题咨询：wangchunhao.7、xiaoyuyan3</div>`;
}

// ---------- 历史日历：加载某一天的数据 ----------
let LATEST=null;
function showData(d){DATA=d;cur=d.depts[0].id;renderTabs();render();}
function loadDay(date){
  // 最新一天读根 data.json（命中 CDN 缓存，最快）；历史日读 archive/
  const url=(date===LATEST?'data.json':'archive/data-'+date+'.json')+'?_='+Date.now();
  fetch(url)
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
    .then(d=>{showData(d);updateFlag(date);})
    .catch(()=>{DATA=FALLBACK_DATA;showData(FALLBACK_DATA);});
}
function updateFlag(date){
  const f=$('dpflag');
  if(!f)return;
  if(date===LATEST){f.className='dp-latest';f.textContent='最新';}
  else{f.className='dp-hist';f.textContent='历史';}
}

// 启动：并行拉季度档案 profiles.json（独立，失败不阻断主流程，面板自动不显示）
fetch('profiles.json?_='+Date.now())
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(p=>{PROFILES=p;if(DATA&&cur==='instant')render();})
  .catch(()=>{PROFILES=null;});

// 启动：并行拉新品周报 newproducts.json（中流数据，每周挂载；失败降级，新品区显示占位）
fetch('newproducts.json?_='+Date.now())
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(p=>{PRODUCTS=p;if(DATA)render();})
  .catch(()=>{PRODUCTS=null;});

// 启动：先拉 manifest 建日期选择器，失败则回退直接读 data.json
fetch('manifest.json?_='+Date.now())
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(mf=>{
    const dates=(mf&&mf.dates)||[];
    if(!dates.length)throw new Error('empty manifest');
    LATEST=mf.latest||dates[0];
    const sel=$('datesel');
    sel.innerHTML=dates.map(d=>`<option value="${d}">${d}</option>`).join('');
    sel.value=LATEST;
    sel.onchange=()=>loadDay(sel.value);
    $('datepick').style.display='flex';
    loadDay(LATEST);
  })
  .catch(()=>{
    // 老入口 / manifest 缺失：保持原行为，直接读 data.json
    fetch('data.json?_='+Date.now())
      .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
      .then(d=>showData(d))
      .catch(()=>showData(FALLBACK_DATA));
  });

</script>
